<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<!-- ✅ スマホズーム防止 -->
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>かんたんPL（損益計算書）</title>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#06C755;
}

.box{
  max-width:520px;
  margin:0 auto;
  background:#fff;
  padding:16px;
  min-height:100vh;
  box-sizing:border-box;
}

.row{display:flex;margin:10px 0}
.botWrap{justify-content:flex-start}
.userWrap{justify-content:flex-end}

.msg{
  padding:12px;
  border-radius:14px;
  max-width:75%;
  line-height:1.7;
  font-size:16px;
}

.bot{background:#e5e5ea}
.user{background:#fff;border:1px solid #ddd}

.icon{width:36px;height:36px;border-radius:50%;margin-right:8px}
.iconRight{width:36px;height:36px;border-radius:50%;margin-left:8px}
.flex{display:flex;align-items:flex-end}

/* ✅ 入力エリア */
.inputWrap{
  position:sticky;
  bottom:0;
  background:#fff;
  padding-top:10px;
  display:flex;
  gap:8px;
}

input{
  flex:1;
  padding:14px;
  font-size:16px; /* iPhoneズーム防止 */
  border-radius:12px;
  border:1px solid #ddd;
}

/* ✅ 送信ボタン */
.sendBtn{
  padding:0 16px;
  border:none;
  border-radius:10px;
  background:#4f8cff;
  color:#fff;
  font-size:16px;
}

/* ✅ リセット */
.resetBtn{
  width:100%;
  padding:10px;
  margin-top:6px;
  border:none;
  border-radius:10px;
  background:#ff5c5c;
  color:#fff;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}
th,td{
  border:1px solid #ddd;
  padding:6px;
  font-size:13px;
}
th{background:#f5f5f5}
</style>
</head>

<body>

<div class="box">
<h3>かんたんPL（損益計算書）</h3>
<div id="chat"></div>

<div class="inputWrap">
<input id="input" placeholder="例：1000000">
<button class="sendBtn" onclick="send()">送信</button>
</div>

<button class="resetBtn" onclick="resetAll()">リセット</button>

</div>

<script>

const botIcon="bot.png";
const userIcon="user.png";

const questions=[
["revenue","売上はいくら？"],
["cogs","売上原価はいくら？"],
["salary","人件費は？"],
["rent","家賃は？"],
["utilities","水道光熱費は？"],
["ads","広告費は？"],
["insurance","保険料は？"],
["supplies","消耗品費は？"],
["other","その他経費は？"],
["nonOpIncome","営業外収益は？"],
["nonOpExpense","営業外費用は？"]
];

let step=0;
let data={};

const chat=document.getElementById("chat");
const input=document.getElementById("input");

/* ✅ BOT表示 */
function addBot(html){
  const row=document.createElement("div");
  row.className="row botWrap";

  const flex=document.createElement("div"); flex.className="flex";
  const icon=document.createElement("img"); icon.src=botIcon; icon.className="icon";
  const msg=document.createElement("div"); msg.className="msg bot"; msg.innerHTML=html;

  flex.appendChild(icon);
  flex.appendChild(msg);
  row.appendChild(flex);
  chat.appendChild(row);
}

/* ✅ USER表示 */
function addUser(text){
  const row=document.createElement("div");
  row.className="row userWrap";

  const flex=document.createElement("div");
  const msg=document.createElement("div"); msg.className="msg user"; msg.innerText=text;
  const icon=document.createElement("img"); icon.src=userIcon; icon.className="iconRight";

  flex.appendChild(msg);
  flex.appendChild(icon);
  row.appendChild(flex);
  chat.appendChild(row);
}

/* ✅ ユーティリティ */
function fmt(n){return n.toLocaleString();}
function valid(v){return /^[0-9]+$/.test(v);}

/* ✅ 入力は数字だけ */
input.addEventListener("input",()=>{
  input.value = input.value.replace(/[^0-9]/g,"");
});

/* ✅ 送信処理（Enter＋ボタン共通） */
function send(){

  const raw=input.value;

  if(!valid(raw)){
    addUser(raw);
    addBot("数字だけ入力してね！");
    input.value="";
    return;
  }

  const val=Number(raw);

  addUser(fmt(val));
  data[questions[step][0]]=val;

  if(step===questions.length-1){

    const revenue=data.revenue||0;
    const cogs=data.cogs||0;
    const gross=revenue-cogs;

    const expenses=
      (data.salary||0)+
      (data.rent||0)+
      (data.utilities||0)+
      (data.ads||0)+
      (data.insurance||0)+
      (data.supplies||0)+
      (data.other||0);

    const operating=gross-expenses;
    const final=operating+((data.nonOpIncome||0)-(data.nonOpExpense||0));

    addBot(`
<b>📊 損益計算書（PL）の結果</b><br><br>

<b>売上：${fmt(revenue)}円</b><br>
👉 売上（収入）<br><br>

<b>原価：${fmt(cogs)}円</b><br>
👉 商品のコスト<br><br>

<b>粗利：${fmt(gross)}円</b><br>
👉 売上 − 原価（ビジネスの強さ）<br><br>

<b>経費：${fmt(expenses)}円</b><br>
👉 会社を回すコスト<br><br>

<b>営業利益：${fmt(operating)}円</b><br>
👉 粗利 − 経費（本業の結果）<br><br>

<b>最終利益：${fmt(final)}円</b><br>
👉 最終的なもうけ<br>

<table>
<tr><th>項目</th><th>金額</th></tr>
<tr><td>売上</td><td>${fmt(revenue)}</td></tr>
<tr><td>原価</td><td>${fmt(cogs)}</td></tr>
<tr><td>粗利</td><td>${fmt(gross)}</td></tr>
<tr><td>経費</td><td>${fmt(expenses)}</td></tr>
<tr><td>営業利益</td><td>${fmt(operating)}</td></tr>
<tr><td>最終利益</td><td>${fmt(final)}</td></tr>
</table>

<br>✅ お疲れ様でした！
`);

    input.style.display="none";
    return;
  }

  step++;
  addBot(questions[step][1]);
  input.value="";
}

/* ✅ Enter対応 */
input.addEventListener("keydown",e=>{
  if(e.key==="Enter") send();
});

/* ✅ 初期メッセージ */
function resetAll(){
  chat.innerHTML="";
  step=0;
  data={};
  input.style.display="block";
  input.value="";
  addBot("最初からやり直すよ😊");
  addBot(questions[0][1]);
}

addBot("PL（損益計算書）を作るよ😊");
addBot(questions[0][1]);

</script>

</body>
</html>
