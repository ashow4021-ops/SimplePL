<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>かんたんPL（損益計算書）</title>

<style>
body{margin:0;font-family:-apple-system;background:#06C755;}

.box{
  max-width:520px;margin:0 auto;background:#fff;
  padding:16px;min-height:100vh;box-sizing:border-box;
}

.row{display:flex;margin:10px 0}
.botWrap{justify-content:flex-start}
.userWrap{justify-content:flex-end}

.msg{
  padding:12px;border-radius:14px;max-width:75%;
  line-height:1.7;font-size:16px;
}

.bot{background:#e5e5ea}
.user{background:#fff;border:1px solid #ddd}

.icon{width:36px;height:36px;border-radius:50%;margin-right:8px}
.iconRight{width:36px;height:36px;border-radius:50%;margin-left:8px}

.flex{display:flex;align-items:flex-end}

.inputWrap{
  position:sticky;bottom:0;background:#fff;
  padding-top:10px;display:flex;gap:8px;
}

input{
  flex:1;padding:14px;font-size:16px;
  border-radius:12px;border:1px solid #ddd;
}

.sendBtn{
  padding:0 16px;border:none;border-radius:10px;
  background:#4f8cff;color:#fff;font-size:16px;
}

.resetBtn{
  width:100%;padding:10px;margin-top:6px;
  border:none;border-radius:10px;background:#ff5c5c;color:#fff;
}
</style>
</head>

<body>

<div class="box">
<h3>かんたんPL（損益計算書）</h3>
<div id="chat"></div>

<div class="inputWrap" id="inputArea">
<input id="input" placeholder="例：1000000">
<button class="sendBtn" onclick="send()">送信</button>
</div>

<button class="resetBtn" onclick="resetAll()">リセット</button>
</div>

<script>

const botIcon="bot.png";
const userIcon="user.png";

/* ✅ 質問＋説明 */
const questions=[
["revenue","売上はいくら？","商品やサービスで得たお金"],
["cogs","売上原価はいくら？","商品を作る・仕入れるための費用"],
["salary","人件費は？","給料やアルバイト代"],
["rent","家賃は？","店舗やオフィスの費用"],
["utilities","水道光熱費は？","電気・ガスなど"],
["ads","広告費は？","集客や広告費"],
["insurance","保険料は？","会社の保険など"],
["supplies","消耗品費は？","備品や消耗品"],
["other","その他経費は？","その他の費用"],
["nonOpIncome","営業外収益は？","利息や雑収入"],
["nonOpExpense","営業外費用は？","借入利息など"]
];

let step=0;
let data={};

const chat=document.getElementById("chat");
const input=document.getElementById("input");
const inputArea=document.getElementById("inputArea");

/* ✅ BOT */
function addBot(html){
  const row=document.createElement("div");
  row.className="row botWrap";

  const flex=document.createElement("div");
  flex.className="flex";

  const icon=document.createElement("img");
  icon.src=botIcon;
  icon.className="icon";

  const msg=document.createElement("div");
  msg.className="msg bot";
  msg.innerHTML=html;

  flex.appendChild(icon);
  flex.appendChild(msg);
  row.appendChild(flex);
  chat.appendChild(row);
}

/* ✅ USER */
function addUser(text){
  const row=document.createElement("div");
  row.className="row userWrap";

  const flex=document.createElement("div");
  flex.className="flex";

  const msg=document.createElement("div");
  msg.className="msg user";
  msg.innerText=text;

  const icon=document.createElement("img");
  icon.src=userIcon;
  icon.className="iconRight";

  flex.appendChild(msg);
  flex.appendChild(icon);

  row.appendChild(flex);
  chat.appendChild(row);
}

/* ✅ 入力制御 */
function fmt(n){return n.toLocaleString();}
function valid(v){return /^[0-9]+$/.test(v);}

input.addEventListener("input",()=>{
  input.value=input.value.replace(/[^0-9]/g,"");
});

/* ✅ 送信 */
function send(){

  const raw=input.value;

  if(!valid(raw)){
    addUser(raw);
    addBot("数字だけ入力してね！");
    input.value="";
    return;
  }

  const val=Number(raw);

  addUser(fmt(val));
  data[questions[step][0]]=val;

  /* ✅ 最後 */
  if(step===questions.length-1){

    const revenue=data.revenue||0;
    const cogs=data.cogs||0;
    const gross=revenue-cogs;

    const expenses=
      (data.salary||0)+(data.rent||0)+(data.utilities||0)+
      (data.ads||0)+(data.insurance||0)+(data.supplies||0)+(data.other||0);

    const operating=gross-expenses;
    const final=operating+((data.nonOpIncome||0)-(data.nonOpExpense||0));

    addBot(`
<b>📊 損益計算書（PL）の結果</b><br><br>

売上：${fmt(revenue)}円<br>
👉 売上（収入）<br><br>

原価：${fmt(cogs)}円<br>
👉 商品コスト<br><br>

粗利：${fmt(gross)}円<br>
👉 売上 − 原価<br><br>

経費：${fmt(expenses)}円<br>
👉 運営コスト<br><br>

営業利益：${fmt(operating)}円<br>
👉 本業の結果<br><br>

最終利益：${fmt(final)}円<br>
👉 最終のもうけ<br><br>

✅ お疲れ様でした！
`);

    /* ✅ 入力完全非表示 */
    inputArea.style.display="none";

    return;
  }

  step++;

  /* ✅ 次の質問＋説明 */
  addBot(`
<b>${questions[step][1]}</b><br>
👉 ${questions[step][2]}
`);

  input.value="";
}

/* ✅ Enter対応 */
input.addEventListener("keydown",e=>{
  if(e.key==="Enter") send();
});

/* ✅ 初期表示 */
function resetAll(){
  chat.innerHTML="";
  step=0;
  data={};
  input.value="";
  inputArea.style.display="flex";

  addBot("最初からやり直すよ😊");
  addBot(`
<b>${questions[0][1]}</b><br>
👉 ${questions[0][2]}
`);
}

addBot("PL（損益計算書）を作るよ😊");
addBot(`
<b>${questions[0][1]}</b><br>
👉 ${questions[0][2]}
`);

</script>

</body>
</html>
